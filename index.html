<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="output.css">
    <script src="index.js" defer></script>
</head>
<body class="bg-gray-900 text-white flex flex-col h-screen items-center justify-center">
    <header class="text-[40px] p-4">Password Generator</header>
    <main class="flex-1 flex flex-col justify-center">
        <div class="flex flex-col gap-3">
            <h1 class="font-bold mb-4">Generate a <span class="text-green-500">random password</span></h1>
            <label>Select the contents of the password</label>
            <label>
                <input id="uppercase" type="checkbox" checked> uppercase
            </label>
            <label>
                <input id="lowercase" type="checkbox" checked> lowercase
            </label>
            <label>
                <input id="numbers" type="checkbox" checked> numbers
            </label>
            <label>
                <input id="symbols" type="checkbox" checked> symbols
            </label>
            <label>Select the length of the password</label>
            <label>
                <input id="eight" name="pass-len" type="radio" value="8" checked> 8
            </label>
            <label>
                <input id="ten" name="pass-len" type="radio" value="10"> 10
            </label>
            <label>
                <input id="twelve" name="pass-len" type="radio" value="12"> 12
            </label>
            <label>
                <input id="fifteen" name="pass-len" type="radio" value="15"> 15
            </label>
            <button id="generate" class="bg-green-700 rounded w-full py-2">generate</button>
        </div>
        <div class="flex justify-center gap-4 mt-6 h-24">
            <div id="pass1" class="w-64 h-12 p-2 bg-gray-700 rounded flex items-center justify-center opacity-0"></div>
            <div id="pass2" class="w-64 h-12 p-2 bg-gray-700 rounded flex items-center justify-center opacity-0"></div>
        </div>
    </main>
    <footer>
        <p class="p-4">&copy; 2026</p>
    </footer>
</body>
</html>
